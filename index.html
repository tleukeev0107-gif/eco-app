<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Eco AI Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #021c1b, #064e3b);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.2);
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 15px;
  padding: 15px;
}

button {
  margin-top: 15px;
  padding: 15px;
  width: 100%;
  border-radius: 15px;
  background: #22c55e;
  border: none;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.4);
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">
<h1>💎 🍀 ECO AI CALCULATOR</h1>

<textarea id="input" placeholder="Спроси что-нибудь..."></textarea>

<button onclick="runAI()">Спросить ИИ</button>

<div class="result" id="result"></div>

<p style="margin-top:30px;">
🌍 Save energy • Reduce CO₂ • Protect water<br><br>
ECO AI CALCULATOR MADE BY TLEUKEYEV YERASSY
</p>
</div>

<script>
function runAI() {
  let text = document.getElementById("input").value.toLowerCase().trim();

  if (!text) return;

  let words = text.split(/\s+/).length;
  let energy = words * 0.002;
  let co2 = energy * 0.5;
  let water = energy * 1.2;

  let response = "";

  if (text.includes("привет")) {
    response = "Привет! Я Eco AI. Чем помочь?";
  } else if (text.includes("код")) {
    response = "Я могу помочь написать код.";
  } else if (text.includes("что такое")) {
    response = "Это вопрос, я постарался дать общее объяснение.";
  } else if (text.includes("экология")) {
    response = "Экология — это защита природы и ресурсов.";
  } else {
    response = "Я обработал твой запрос и дал ответ.";
  }

  document.getElementById("result").innerHTML =
    response + "<br><br>(" +
    energy.toFixed(4) + " кВт⋅ч, " +
    co2.toFixed(4) + " кг CO₂, " +
    water.toFixed(4) + " л воды)";
}
</script>

</body>
</html>
