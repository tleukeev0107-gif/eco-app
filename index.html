<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Eco AI Calculator</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #022c22);
  color: white;
  text-align: center;
  padding: 30px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.symbols {
  font-size: 40px;
}

textarea {
  width: 90%;
  height: 120px;
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  border: none;
  font-size: 16px;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  border: none;
  border-radius: 20px;
  background: #22c55e;
  font-size: 18px;
  cursor: pointer;
}

.result {
  margin-top: 30px;
  background: #020617;
  padding: 20px;
  border-radius: 15px;
  font-size: 18px;
}

.footer {
  margin-top: 40px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="symbols">💎 🍀</div>

<h1>ECO AI CALCULATOR</h1>

<textarea id="input" placeholder="Напиши запрос..."></textarea><br>

<button onclick="runAI()">Запустить ИИ</button>

<div class="result" id="result"></div>

<div class="footer">
ECO AI CALCULATOR MADE BY TLEUKEYEV YERASSY
</div>

<script>
function runAI() {
  let text = document.getElementById("input").value.trim();

  if (text === "") {
    document.getElementById("result").innerHTML = "Введите запрос";
    return;
  }

  let words = text.split(/\s+/).filter(w => w.length > 0).length;

  let energy = words * 0.002;
  let co2 = energy * 0.5;
  let water = energy * 1.2;

  // простой "ИИ"
  let response = "";

  if (text.toLowerCase().includes("код")) {
    response = "Я могу помочь с программированием.";
  } else if (text.toLowerCase().includes("текст")) {
    response = "Я анализирую текст и даю ответ.";
  } else if (text.toLowerCase().includes("привет")) {
    response = "Привет! Я Eco AI 🤖";
  } else {
    response = "Я обработал твой запрос и дал ответ.";
  }

  document.getElementById("result").innerHTML =
    response + "<br><br>(" +
    energy.toFixed(4) + " кВт⋅ч, " +
    co2.toFixed(4) + " кг CO₂, " +
    water.toFixed(4) + " л воды)";
}
</script>

</body>
</html>
