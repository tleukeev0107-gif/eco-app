<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <title>Eco AI Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #22c55e;
    }

    textarea {
      width: 80%;
      height: 120px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 30px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🌍 Eco AI Calculator</h1>

<textarea id="input" placeholder="Введи текст..."></textarea><br>

<button onclick="calculate()">Рассчитать</button>

<div class="result" id="result"></div>

<script>
function calculate() {
  let text = document.getElementById("input").value;

  let words = text.split(" ").length;

  let energy = words * 0.002;
  let co2 = energy * 0.5;
  let water = energy * 1.2;

  document.getElementById("result").innerHTML = `
    ⚡ Энергия: ${energy.toFixed(4)} кВт⋅ч<br><br>
    🌫 CO₂: ${co2.toFixed(4)} кг<br><br>
    💧 Вода: ${water.toFixed(4)} литров
  `;
}
</script>

</body>
</html>
